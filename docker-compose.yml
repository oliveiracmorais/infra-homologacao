services:
  caddy:
    image: caddy:2-alpine
    container_name: homol-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/homol/volumes/caddy/data:/data
      - /srv/homol/volumes/caddy/config:/config
    networks:
      - homol-net

  postgres:
    image: postgres:17-alpine
    container_name: homol-pg
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
    volumes:
      - /srv/homol/volumes/pgdata:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    networks:
      - homol-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  homol-net:
    driver: bridge
