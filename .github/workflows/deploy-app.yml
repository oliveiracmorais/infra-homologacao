name: Deploy App to Homologation

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          APP_NAME: ${{ inputs.app-name }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "cd /srv/homol/apps/$APP_NAME && docker compose -f docker-compose.homol.yml pull && docker compose -f docker-compose.homol.yml up -d --remove-orphans && docker image prune -f"
