name: Deploy App to Homologation

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" bash -s << CMD
            set -e
            cd /srv/homol/apps/${{ inputs.app-name }}
            docker compose pull || true
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deploy of ${{ inputs.app-name }} completed"
CMD
